name: ML CI Pipeline
on:
    push:
        branches:
            - main
    pull_request:
            branches:
                - main

jobs:
    build:
        
        runs-on: ubuntu-latest

        steps:
            - name: Chechkout Repository
              uses: actions/checkout@v4

            - name: Setup Python  
              uses: actions/setup@v5
              with:
                python-version: '3.10'

            - name: Install Dependencies
              run: 
                python -m pip install --upgrade pip
                pip install -r requirements.txt
            - name: Run Tests
              run: |
               pytest
               
            - name: Train Model
              run : |
               python train.py
